<!DOCTYPE html>

<html>

<head>

<link
rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="card">

<h1>🔐 Your Vault</h1>

<p class="subtitle">

Upload and access encrypted files

</p>

<form
action="/upload"
method="POST"
enctype="multipart/form-data">

<input
type="file"
name="file"
required>

<button>

Upload File

</button>

</form>

<hr>

{% for f in files %}

<div class="file">

<span>

{{f.filename}}

</span>

<a
href="/download/{{f.filename}}">

Download

</a>

</div>

{% endfor %}

<br>

<a href="/logout">

Logout

</a>

</div>

</body>

</html>
