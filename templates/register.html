<!DOCTYPE html>

<html>

<head>

<link
rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="card">

<h1>📝 Register</h1>

<p class="subtitle">

Create your secure vault account

</p>

{% if error %}

<div class="error">

{{error}}

</div>

{% endif %}

<form method="POST">

<input
name="username"
placeholder="Username"
required>

<input
type="password"
name="password"
placeholder="Password"
required>

<button>

Register

</button>

</form>

<br>

<a href="/login">

Already have account?

</a>

</div>

</body>

</html>
